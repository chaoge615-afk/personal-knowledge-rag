<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .answer-section {
            margin-top: 30px;
        }
        .answer-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .answer-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            color: #333;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
        .loading::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }
        .stats {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 个人知识库问答系统</h1>

        <div class="input-group">
            <input type="text" id="questionInput" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
            <button id="askBtn" onclick="askQuestion()">提问</button>
        </div>

        <div class="answer-section">
            <h3>回答：</h3>
            <div class="answer-box" id="answerBox">请在上方输入问题，点击提问按钮获取回答</div>
        </div>

        <div class="stats" id="statsBox"></div>
    </div>

    <script>
        async function askQuestion() {
            const input = document.getElementById("questionInput");
            const btn = document.getElementById("askBtn");
            const answerBox = document.getElementById("answerBox");

            const question = input.value.trim();
            if (!question) {
                answerBox.textContent = "请输入问题";
                return;
            }

            // 显示加载状态
            btn.disabled = true;
            answerBox.innerHTML = '<div class="loading">正在思考中</div>';

            try {
                const response = await fetch("/api/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                answerBox.textContent = data.answer || "未收到回答";

                // 更新统计信息
                updateStats();
            } catch (error) {
                answerBox.textContent = "请求失败: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                askQuestion();
            }
        }

        async function updateStats() {
            try {
                const response = await fetch("/api/stats");
                const data = await response.json();
                if (data.total_chunks !== undefined) {
                    document.getElementById("statsBox").textContent =
                        `知识库文档块数: ${data.total_chunks}`;
                }
            } catch (error) {
                console.error("获取统计信息失败:", error);
            }
        }

        // 页面加载时获取统计信息
        updateStats();
    </script>
</body>
</html>
